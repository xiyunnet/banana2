<!-- 图片查看器组件 - 全屏层 -->
<div class="viewer-layer" id="viewer-layer">
    <!-- 关闭按钮 - 右上角 -->
    <button class="viewer-close-btn" id="viewer-close-btn" title="关闭">✕</button>
    
    <div class="viewer-container">
        <!-- 左侧按钮区 -->
        <div class="viewer-sidebar">
            <button class="viewer-side-btn icon icon-creative_fill" style="font-size: 22px;color: rgb(11, 204, 204);" id="viewer-info-btn" title="" data-i18n-title="viewer.info"></button>
            <button class="viewer-side-btn" id="viewer-folder-btn" title="" data-i18n-title="viewer.openFolder">📁</button>
            <button class="viewer-side-btn icon icon-a-chuangzuo2" style="font-size: 22px;color: crimson;" id="viewer-edit-btn" title="" data-i18n-title="viewer.regenerate"></button>
            <button class="viewer-side-btn icon icon-chuangzuo1" id="viewer-add-btn" title="编辑图片" style="font-size: 22px;color: rgb(7, 176, 58);"></button>
            
            <!-- 参考图片区域 -->
            <div class="viewer-ref-images" id="viewer-ref-images" style="display: none;">
                <div class="viewer-ref-title">参考图</div>
                <div class="viewer-ref-list" id="viewer-ref-list"></div>
            </div>
        </div>
        
        <!-- 中间图片展示区 -->
        <div class="viewer-main">
            <img id="viewer-main-img" src="" alt="" class="viewer-main-img">
        </div>
        
        <!-- 右侧图片列表区 - 仅当 cut > 1 时显示 -->
        <div class="viewer-list" id="viewer-list" style="display: none;">
            <div class="viewer-list-columns">
                <div class="viewer-list-col" id="viewer-list-left"></div>
                <div class="viewer-list-col" id="viewer-list-right"></div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    const workId = window._winViewerId;
    if (!workId) return;
    
    // 隐藏编辑器
    const editor = document.getElementById('editor');
    const editorDisplay = editor ? editor.style.display : 'block';
    if (editor){editor.style.display = 'none';$('#btn-editor').removeClass('active')}
    
    // 从后端获取任务数据
    $.get(`/api/work/${workId}`, function(res) {
        if (!res.success || !res.data) {
            alert(t('taskDetail.notFound'));
            closeViewer();
            return;
        }
        
        const work = res.data;
        window._currentViewerWork = work;
        
        // 检查任务状态
        if (work.state !== 10) {
            alert(t('taskDetail.notFound'));
            closeViewer();
            return;
        }
        
        // 使用 http_path（后端已计算好）
        const httpPath = work.http_path || `/images/${workId}`;
        const mainSrc = `${httpPath}/main.png`;
        const thumbSrc = `${httpPath}/thumb.png`;
        
        // 设置主图
        $('#viewer-main-img').attr('src', mainSrc);
        
        // 解析 request_data 获取参考图片
        let refImages = [];
        try {
            const requestData = JSON.parse(work.request_data || '{}');
            // 从 request_data.image_urls 获取
            if (requestData.image_urls && requestData.image_urls.length > 0) {
                refImages = requestData.image_urls;
            }
        } catch (e) {
            console.error('解析 request_data 失败:', e);
        }
        
        // 显示参考图片
        if (refImages.length > 0) {
            $('#viewer-ref-images').show();
            const refHtml = refImages.map((url, idx) => `
                <div class="viewer-ref-item" data-url="${url}" title="点击查看参考图 ${idx + 1}">
                    <img src="${url}" alt="参考图 ${idx + 1}" onerror="this.parentElement.style.display='none'">
                </div>
            `).join('');
            $('#viewer-ref-list').html(refHtml);
            
            // 点击参考图在主窗口显示
            $('.viewer-ref-item').on('click', function() {
                const url = $(this).data('url');
                $('#viewer-main-img').attr('src', url);
            });
        }
        
        // 切割图列表 - 仅当 cut > 1 时显示
        if (work.cut > 1) {
            $('#viewer-list').show();
            
            let leftHtml = '';
            let rightHtml = '';
            
            // 主图放左边 - 使用默认值或尝试获取翻译
            const mainImageLabel = (typeof t === 'function') ? t('viewer.mainImage') : '主图.png';
            leftHtml += `
                <div class="viewer-list-item active" data-src="${mainSrc}">
                    <img src="${thumbSrc}" alt="${mainImageLabel}" onerror="if(this.src!==this.dataset.fallback){this.src=this.dataset.fallback}else{this.style.display='none'}" data-fallback="${mainSrc}">
                    <div class="viewer-list-item-label">${mainImageLabel}</div>
                </div>
            `;
            
            // 切割图 - 偶数放左边，奇数放右边
            for (let i = 1; i <= work.cut; i++) {
                const itemHtml = `
                    <div class="viewer-list-item" data-src="${httpPath}/${i}.png">
                        <img src="${httpPath}/${i}.png" alt="切割图 ${i}" onerror="this.parentElement.style.display='none'">
                        <div class="viewer-list-item-label">${i}.png</div>
                    </div>
                `;
                
                if (i % 2 === 0) {
                    leftHtml += itemHtml;  // 偶数：2, 4, 6...
                } else {
                    rightHtml += itemHtml; // 奇数：1, 3, 5...
                }
            }
            
            $('#viewer-list-left').html(leftHtml);
            $('#viewer-list-right').html(rightHtml);
            
            // 点击列表项切换主图
            $('.viewer-list-item').on('click', function() {
                const src = $(this).data('src');
                $('#viewer-main-img').attr('src', src);
                $('.viewer-list-item').removeClass('active');
                $(this).addClass('active');
            });
        }
        
        // 绑定按钮事件
        // 详情
        $('#viewer-info-btn').on('click', function() {
            closeViewer();
            window._winTaskId = workId;
            win('task-detail', '任务详情', 'task-detail.html', 450);
        });
        
        // 打开文件夹
        $('#viewer-folder-btn').on('click', function() {
            $.ajax({
                url: '/api/open-folder',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ path: work.path })
            });
        });
        
        // 编辑
        $('#viewer-edit-btn').on('click', function() {
            const editorInput = document.getElementById('editor-input');
            if (editorInput && work.prompt) {
                editorInput.textContent = work.prompt;
            }
            closeViewer();
        });
        
        // 添加到编辑器
        $('#viewer-add-btn').on('click', function() {
            const editorInput = document.getElementById('editor-input');
            const editorElement = document.getElementById('editor');
            const editorUpload = document.getElementById('editor-upload');
            const uploadBtn = document.getElementById('upload-btn');
            
            // 设置提示词
            if (editorInput && work.prompt) {
                editorInput.textContent = work.prompt;
            }
            
            // 获取当前 main 中显示的图片 src
            const currentSrc = $('#viewer-main-img').attr('src');
            
            if (!currentSrc || !work.path) {
                return;
            }
            
            // 使用全局 state 变量
            if (typeof state !== 'undefined' && state.uploadedImages) {
                // 从 currentSrc 提取文件名，统一处理路径分隔符
                let filename = 'main.png';
                const normalizedSrc = currentSrc.replace(/\\/g, '/');
                const lastSlashIndex = normalizedSrc.lastIndexOf('/');
                if (lastSlashIndex !== -1 && lastSlashIndex < normalizedSrc.length - 1) {
                    filename = normalizedSrc.substring(lastSlashIndex + 1);
                }
                
                // 组合完整的本地路径
                const localFilePath = work.path + '\\' + filename;
                
                // 检查是否已存在
                const exists = state.uploadedImages.some(img => 
                    img.file_path === localFilePath || img.url === currentSrc
                );
                
                if (!exists) {
                    state.uploadedImages.push({
                        name: filename,
                        uploaded: false,
                        fromWork: true,
                        file_path: localFilePath,
                        url: currentSrc
                    });
                    
                    if (typeof renderUploadedImages === 'function') {
                        renderUploadedImages();
                    }
                }
            }
            
            // 显示编辑器
            if (editorElement) {
                editorElement.style.display = 'block';
            }
            if (editorUpload && state && state.uploadedImages && state.uploadedImages.length > 0) {
                editorUpload.style.display = 'flex';
            }
            if (uploadBtn && state && state.uploadedImages && state.uploadedImages.length > 0) {
                uploadBtn.style.display = 'none';
            }
            
            closeViewer();
        });
        
        // 关闭
        $('#viewer-close-btn').on('click', closeViewer);
        
        // 点击背景关闭
        $('#viewer-layer').on('click', function(e) {
            if (e.target === this) {
                closeViewer();
            }
        });
        
        // ESC 关闭
        $(document).on('keydown.viewer', function(e) {
            if (e.key === 'Escape') {
                closeViewer();
            }
        });
        
    }).fail(function() {
        alert('加载失败');
        closeViewer();
    });
    
    function closeViewer() {
        $('#viewer-layer').removeClass('show');
        setTimeout(() => {
            $('#viewer-layer').remove();
            $(document).off('keydown.viewer');
            // 恢复编辑器显示
            if (editor) {
                editor.style.display = editorDisplay;
                $('#btn-editor').addClass('active')
            }
        }, 300);
    }
    
    window.closeViewerLayer = closeViewer;
    
    // 显示动画
    setTimeout(() => $('#viewer-layer').addClass('show'), 10);
})();
</script>
